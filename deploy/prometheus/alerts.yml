groups:
  - name: turin-platform
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status_class=~"5xx"}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Error rate > 5% over 5 minutes"
          description: "HTTP 5xx rate is {{ $value | humanizePercentage }} — above 5% threshold"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "P99 latency > 5s"
          description: "P99 request latency is {{ $value }}s — above 5s threshold"

      - alert: InstanceDown
        expr: up{job="turin-platform"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "Instance has been unreachable for over 1 minute"

      - alert: HighAuditDenyRate
        expr: rate(audit_decisions_total{decision="deny"}[1h]) > 10
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "High audit deny rate"
          description: "Policy engine denied {{ $value | humanize }} requests in the last hour — possible attack pattern"

      - alert: WorkerQueueBacklog
        expr: arq_queue_depth > 100
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Worker queue backlog > 100"
          description: "ARQ worker queue has {{ $value }} pending jobs — worker may be stalled"
