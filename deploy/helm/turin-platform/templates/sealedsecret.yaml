# SealedSecret template — for production GitOps deployments.
# Encrypt secrets with: kubeseal --format yaml < secret.yaml > sealed-secret.yaml
# See: https://github.com/bitnami-labs/sealed-secrets
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: turin-platform-secrets
  namespace: turin-platform
spec:
  template:
    type: Opaque
    metadata:
      name: turin-platform-secrets
      namespace: turin-platform
  # encryptedData is populated by kubeseal at deploy time
  encryptedData: {}
