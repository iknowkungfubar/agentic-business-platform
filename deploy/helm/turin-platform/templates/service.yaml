apiVersion: v1
kind: Service
metadata:
  name: turin-platform-api
  namespace: {{ .Values.namespace | default "turin-platform" }}
  labels:
    app: turin-platform
    component: api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      name: http
  selector:
    app: turin-platform
    component: api
