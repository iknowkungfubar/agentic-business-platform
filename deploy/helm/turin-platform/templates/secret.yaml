apiVersion: v1
kind: Secret
metadata:
  name: turin-platform-secrets
  namespace: {{ .Values.namespace | default "turin-platform" }}
type: Opaque
stringData:
  database-url: "postgresql://{{ .Values.database.user }}:{{ .Values.database.password }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
  jwt-secret: {{ .Values.jwt.secret | default (randAlphaNum 32) | quote }}
