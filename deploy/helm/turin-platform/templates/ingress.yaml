apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: turin-platform-ingress
  namespace: {{ .Values.namespace | default "turin-platform" }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: turin-platform-api
                port:
                  number: {{ .Values.service.port }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: turin-platform-tls
