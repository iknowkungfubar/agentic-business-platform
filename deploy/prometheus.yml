# Prometheus config — scrape the TurinTech Platform
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'turin-platform'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'turin-platform'
