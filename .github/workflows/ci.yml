name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Init submodules
        run: git submodule update --init --recursive
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Check formatting
        run: uv run ruff format --check app/ core/ tests/
      - name: Lint
        run: uv run ruff check app/ core/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Init submodules
        run: git submodule update --init --recursive
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: uv run python -m pytest tests/ -q --tb=short
      - name: Security scan — Bandit
        run: uv run pip install bandit && uv run python -m bandit -r app/ core/ -f json -o bandit-report.json || true
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Init submodules
        run: git submodule update --init --recursive
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          skip-dirs: .venv,node_modules,acp/.venv
      - name: Trivy — SBOM
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: trivy-sbom.cdx.json
          skip-dirs: .venv,node_modules,acp/.venv
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sbom
          path: trivy-sbom.cdx.json

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Init submodules
        run: git submodule update --init --recursive
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Build package
        run: uv build
