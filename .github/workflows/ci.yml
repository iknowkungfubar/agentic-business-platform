name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --group dev
      - name: Check formatting
        run: uv run ruff format --check core/ tests/
      - name: Lint
        run: uv run ruff check core/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests
        run: uv run python -m pytest tests/ -q --tb=short
      - name: Check coverage
        run: uv run python -m pytest tests/ --cov=core/ --cov-report=term-missing --cov-fail-under=70

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --group dev
      - name: Check dependencies
        run: uv run python -m core.hardening.sbom
      - name: Vulnerability audit
        run: uv pip install pip-audit && uv run pip-audit --strict 2>&1 | tail -20 || true
      - name: Secrets scan
        run: uv pip install detect-secrets && uv run detect-secrets scan core/ 2>&1 | tail -20 || true
      - name: List dependencies
        run: uv pip list

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.13
      - name: Build package
        run: uv build
      - name: Store build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
