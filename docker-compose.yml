services:
  api:
    build: .
    container_name: turin-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://turin:turin@db:5432/turin
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - INFERENCE_URL=http://host.docker.internal:1234/v1
      - LOG_LEVEL=info
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - audit_data:/app/data/audit
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: turin-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=turin
      - POSTGRES_PASSWORD=turin
      - POSTGRES_DB=turin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turin"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: turin-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: turin-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  qdrant_data:
  audit_data:
