services:
  api:
    build: .
    container_name: turin-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://turin:${PGPASSWORD:-turin}@db:5432/turin
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - INFERENCE_URL=${INFERENCE_URL:-http://host.docker.internal:1234/v1}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - audit_data:/app/data/audit
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: turin-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=turin
      - POSTGRES_PASSWORD=${PGPASSWORD:-turin}
      - POSTGRES_DB=turin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turin"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  pgdata:
  audit_data:
