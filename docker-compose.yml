services:
  api:
    build: .
    container_name: turin-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://turin:${PGPASSWORD:-turin}@db:5432/turin
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - INFERENCE_URL=${INFERENCE_URL:-http://host.docker.internal:1234/v1}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - audit_data:/app/data/audit
      - upload_data:/tmp/turin-uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: .
    container_name: turin-worker
    restart: unless-stopped
    command: python -m app.worker
    environment:
      - DATABASE_URL=postgresql://turin:${PGPASSWORD:-turin}@db:5432/turin
      - INFERENCE_URL=${INFERENCE_URL:-http://host.docker.internal:1234/v1}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - upload_data:/tmp/turin-uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: pgvector/pgvector:pg16
    container_name: turin-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=turin
      - POSTGRES_PASSWORD=${PGPASSWORD:-turin}
      - POSTGRES_DB=turin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turin"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: turin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Monitoring (optional profile) ──────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: turin-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: turin-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  pgdata:
  audit_data:
  upload_data:
  prometheus_data:
  grafana_data:
