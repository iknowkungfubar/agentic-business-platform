[project]
name = "turin-platform"
version = "0.1.0"
description = "TurinTech Agentic Business Platform — data pipeline and model router"
authors = [{name = "iknowkungfubar", email = "hello@turintech.solutions"}]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0",
    "httpx>=0.27.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
